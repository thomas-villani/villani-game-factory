// ── Helpers ─────────────────────────────────────────
let worldData=null,curContinent=null,explored=new Set(),selectedId=null;
let svgEl=null,gEl=null,zoomBehavior=null;
let ttsAudio=null,ttsPlaying=false;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setMascot(s){const m=document.getElementById('mascot');m.className='';void m.offsetWidth;m.className=s||'mfloat';if(s&&s!=='mfloat')m.addEventListener('animationend',()=>{m.className='mfloat';},{once:true});}

// Tooltip
let ttTimer=null;
function showTooltip(text,x,y,dur=0){
  clearTimeout(ttTimer);
  const tt=document.getElementById('tooltip');
  tt.textContent=text;tt.style.display='block';
  tt.style.left=Math.min(x+14,innerWidth-150)+'px';tt.style.top=(y-32)+'px';
  if(dur)ttTimer=setTimeout(()=>tt.style.display='none',dur);
}
function hideTooltip(){clearTimeout(ttTimer);document.getElementById('tooltip').style.display='none';}

function confetti(x,y){const c=['#ffd700','#4ade80','#60a5fa','#f472b6','#fb923c'];for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,d=40+Math.random()*60;const sp=document.createElement('div');sp.style.cssText=`position:fixed;width:7px;height:7px;border-radius:50%;background:${c[i%5]};left:${x}px;top:${y}px;pointer-events:none;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation:cpop .6s forwards;z-index:60`;document.getElementById('particles').appendChild(sp);setTimeout(()=>sp.remove(),700);}}

function ttsPlay(a2){
  ttsStop();
  const src='audio/countries/'+a2+'.mp3';
  ttsAudio=new Audio(src);
  ttsAudio.onplay=()=>{ttsPlaying=true;updateTtsBtn();};
  ttsAudio.onended=()=>{ttsPlaying=false;updateTtsBtn();};
  ttsAudio.onerror=()=>{ttsPlaying=false;ttsAudio=null;updateTtsBtn();};
  ttsAudio.play().catch(()=>{});
}
function ttsStop(){
  if(ttsAudio){ttsAudio.pause();ttsAudio.currentTime=0;ttsAudio=null;}
  ttsPlaying=false;updateTtsBtn();
}
function ttsToggle(a2){ttsPlaying?ttsStop():ttsPlay(a2);}
function updateTtsBtn(){
  const btn=document.getElementById('tts-btn');
  if(btn)btn.textContent=ttsPlaying?'\u23f9 Stop':'\u{1f50a} Listen';
}

function getCountryColor(info){
  return SUBREGION_COLORS[info.sr]||'#0e2e58';
}

function countForContinent(ckey){
  if(ckey==='world')return Object.keys(CD).length;
  return Object.values(CD).filter(c=>c.c===ckey).length;
}

function exploredForContinent(ckey){
  if(ckey==='world')return explored.size;
  return [...explored].filter(id=>CD[id]&&CD[id].c===ckey).length;
}

// ── Build continent picker ──────────────────────────
(()=>{
  const grid=document.getElementById('continent-grid');
  for(const [key,cfg] of Object.entries(CONTINENTS)){
    const ct=countForContinent(key);
    const btn=document.createElement('button');
    btn.className='continent-btn'+(key==='world'?' world-btn':'');
    btn.innerHTML=`<span class="emoji">${cfg.emoji}</span><span class="cname">${cfg.name}</span><span class="ccount">${ct} countries</span>`;
    btn.onclick=()=>openContinent(key);
    grid.appendChild(btn);
  }
})();

// ── Map loading & rendering ─────────────────────────
async function loadWorld(){
  if(worldData)return true;
  document.getElementById('map-wrap').innerHTML='<p style="opacity:.5;text-align:center;padding-top:30vh">Loading world map\u2026</p>';
  try{
    worldData=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
    return true;
  }catch(e){
    document.getElementById('map-wrap').innerHTML='<p style="color:#ff8888;text-align:center;padding-top:30vh">Could not load map. Please check your internet connection.</p>';
    return false;
  }
}

async function openContinent(key){
  initAC();sndNav();
  curContinent=key;
  showScreen('explore');
  document.getElementById('hud').classList.add('active');
  document.getElementById('zoom-controls').classList.add('active');
  document.getElementById('mascot').style.display='block';
  setMascot('mfloat');

  const cfg=CONTINENTS[key];
  document.getElementById('hud-continent').textContent=cfg.emoji+' '+cfg.name;
  updateExploredHud();

  const ok=await loadWorld();
  if(!ok)return;
  renderContinent(key);
}

function renderContinent(key){
  const wrap=document.getElementById('map-wrap');
  wrap.innerHTML='';
  closeInfo();

  const cfg=CONTINENTS[key];
  const w=960,h=600;
  svgEl=d3.select(wrap).append('svg')
    .attr('viewBox',`0 0 ${w} ${h}`)
    .attr('preserveAspectRatio','xMidYMid meet');

  const proj=cfg.proj==='natural'
    ?d3.geoNaturalEarth1().scale(cfg.scale).translate([w/2,h/2])
    :d3.geoMercator().center(cfg.center).scale(cfg.scale).translate([w/2,h/2]);
  const path=d3.geoPath().projection(proj);

  const allFeatures=topojson.feature(worldData,worldData.objects.countries).features;
  const isWorld=key==='world';
  const features=allFeatures.filter(d=>{
    const info=CD[String(Number(d.id))];
    return info&&(isWorld||info.c===key);
  });

  gEl=svgEl.append('g');

  // Country fills
  gEl.selectAll('path.country-path')
    .data(features)
    .join('path')
    .attr('class',d=>{
      const nid=String(Number(d.id));
      let cls='country-path';
      if(explored.has(nid))cls+=' explored';
      if(nid===selectedId)cls+=' selected';
      return cls;
    })
    .attr('id',d=>'c-'+d.id)
    .attr('d',path)
    .attr('fill',d=>{
      const info=CD[String(Number(d.id))];
      return info?getCountryColor(info):'#1a2a5a';
    })
    .on('mousemove',(e,d)=>{
      const info=CD[String(Number(d.id))];
      if(!info)return;
      showTooltip(info.n,e.clientX,e.clientY);
    })
    .on('mouseleave',()=>hideTooltip())
    .on('click',(e,d)=>{
      const nid=String(Number(d.id));
      const info=CD[nid];
      if(info)selectCountry(nid,info,e.clientX,e.clientY);
    });

  // Borders (only between countries in this continent)
  const cSet=new Set(features.map(f=>f.id));
  const allMesh=topojson.mesh(worldData,worldData.objects.countries,(a,b)=>a!==b&&(cSet.has(a.id)||cSet.has(b.id)));
  gEl.append('path')
    .datum(allMesh)
    .attr('fill','none')
    .attr('stroke','rgba(100,140,200,.3)')
    .attr('stroke-width','0.5')
    .attr('d',path)
    .attr('pointer-events','none');

  // Zoom
  zoomBehavior=d3.zoom()
    .scaleExtent([1,10])
    .on('zoom',e=>gEl.attr('transform',e.transform));
  svgEl.call(zoomBehavior);
}

function zoomIn(){if(svgEl&&zoomBehavior)svgEl.transition().duration(300).call(zoomBehavior.scaleBy,1.5);}
function zoomOut(){if(svgEl&&zoomBehavior)svgEl.transition().duration(300).call(zoomBehavior.scaleBy,0.67);}
function zoomReset(){if(svgEl&&zoomBehavior)svgEl.transition().duration(300).call(zoomBehavior.transform,d3.zoomIdentity);}

// ── Country selection & info panel ──────────────────
function selectCountry(nid,info,cx,cy){
  initAC();
  const isNew=!explored.has(nid);
  explored.add(nid);
  selectedId=nid;

  // Update map styling
  d3.selectAll('.country-path').classed('selected',false).classed('explored',function(){
    const fid=String(Number(d3.select(this).datum().id));
    return explored.has(fid);
  });
  const el=svgEl.select('#c-'+nid.padStart(3,'0'));
  if(!el.empty())el.classed('selected',true);
  // Also try without padding
  const el2=svgEl.select('#c-'+nid);
  if(!el2.empty())el2.classed('selected',true);

  if(isNew){sndDiscover();setMascot('mhappy');confetti(cx,cy);}
  else{sndOpen();}

  updateExploredHud();
  showInfo(nid,info);
}

function showInfo(nid,info){
  const panel=document.getElementById('info-panel');
  const flagUrl='https://flagcdn.com/w80/'+info.a2+'.png';
  const flagUrl2x='https://flagcdn.com/w160/'+info.a2+'.png';

  // Build sorted list for prev/next nav
  const continentIds=Object.entries(CD).filter(([,v])=>v.c===info.c).sort((a,b)=>a[1].n.localeCompare(b[1].n));
  const idx=continentIds.findIndex(([k])=>k===nid);
  const prev=idx>0?continentIds[idx-1]:null;
  const next=idx<continentIds.length-1?continentIds[idx+1]:null;

  document.getElementById('info-content').innerHTML=`
    <div class="info-header">
      <img class="info-flag" src="${flagUrl}" srcset="${flagUrl2x} 2x" alt="Flag of ${info.n}" onerror="this.style.display='none'">
      <div><h2>${info.n}</h2>
      <button id="tts-btn" class="btn btn-ghost" onclick="ttsToggle('${info.a2}')" style="margin-top:6px;font-size:.78em;padding:5px 12px">\u{1f50a} Listen</button></div>
    </div>
    <div class="info-row"><span class="info-label">Capital</span><span class="info-value">${info.cap}</span></div>
    <div class="info-row"><span class="info-label">Languages</span><span class="info-value">${info.lang.join(', ')}</span></div>
    <div class="info-row"><span class="info-label">Population</span><span class="info-value">${info.pop}</span></div>
    <div class="info-row"><span class="info-label">Currency</span><span class="info-value">${info.cur}</span></div>
    <div class="facts-title">Fun Facts</div>
    ${info.facts.map(f=>`<div class="fact-item">${f}</div>`).join('')}
    <div class="info-nav">
      ${prev?`<button class="btn btn-ghost" onclick="navCountry('${prev[0]}')">\u2190 ${prev[1].n}</button>`:''}
      ${next?`<button class="btn btn-ghost" onclick="navCountry('${next[0]}')">${next[1].n} \u2192</button>`:''}
    </div>
  `;
  panel.classList.add('open');
}

function navCountry(nid){
  const info=CD[nid];
  if(!info)return;
  ttsStop();
  explored.add(nid);
  selectedId=nid;
  sndOpen();

  d3.selectAll('.country-path').classed('selected',false).classed('explored',function(){
    const fid=String(Number(d3.select(this).datum().id));
    return explored.has(fid);
  });
  const el=svgEl.select('#c-'+nid.padStart(3,'0'));
  if(!el.empty())el.classed('selected',true);
  const el2=svgEl.select('#c-'+nid);
  if(!el2.empty())el2.classed('selected',true);

  updateExploredHud();
  showInfo(nid,info);
  document.getElementById('info-panel').scrollTop=0;
}

function closeInfo(){
  ttsStop();
  document.getElementById('info-panel').classList.remove('open');
  selectedId=null;
  d3.selectAll('.country-path').classed('selected',false);
}

function updateExploredHud(){
  if(!curContinent)return;
  const total=countForContinent(curContinent);
  const exp=exploredForContinent(curContinent);
  document.getElementById('hud-explored').textContent=`Explored ${exp} / ${total}`;
}

function goHome(){
  showScreen('home');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('zoom-controls').classList.remove('active');
  document.getElementById('mascot').style.display='none';
  closeInfo();
  curContinent=null;selectedId=null;
