<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Tap 🗺️</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07071f;color:#fff;font-family:'Comic Sans MS','Chalkboard SE',cursive;height:100vh;overflow:hidden;user-select:none}
canvas#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.screen{display:none;position:fixed;inset:0;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:rgba(255,255,255,.08);border-radius:22px;padding:24px 32px;width:min(500px,94vw);border:2px solid rgba(255,255,255,.15);backdrop-filter:blur(8px)}
h1{text-align:center;font-size:clamp(1.3em,4vw,2em);margin-bottom:14px}
label{display:block;margin:10px 0 3px;font-size:.86em;opacity:.75}
.prow{display:flex;gap:8px;align-items:center;margin:4px 0}
.prow input{flex:1;padding:7px 11px;border-radius:10px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:1em}
.prow input::placeholder{color:rgba(255,255,255,.4)}
select{width:100%;padding:7px 10px;border-radius:10px;border:2px solid rgba(255,255,255,.25);background:rgba(20,20,60,.95);color:#fff;font-family:inherit}
select option{background:#1a1a4e}
.rbtns{display:flex;gap:8px;margin:5px 0}
.btn{padding:8px 18px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;font-size:.93em;font-weight:700;transition:transform .1s}
.btn:active{transform:scale(.95)}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff}
.btn-go{background:#4ade80;color:#0a2a0a;font-size:1.15em;padding:13px 40px;border-radius:18px}
.btn-go:hover{filter:brightness(1.1)}
#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(0,0,0,.65);z-index:10}
#tbar-wrap{position:fixed;top:52px;left:0;right:0;height:4px;background:rgba(255,255,255,.1);z-index:10}
#tbar{height:100%;background:#4ade80;transition:width .25s linear,background .5s}
#game-main{position:fixed;top:56px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:6px 8px 6px;z-index:5;gap:4px;overflow:hidden}
#target-banner{text-align:center;flex-shrink:0}
#target-lbl{font-size:.7em;opacity:.5;text-transform:uppercase;letter-spacing:.5px}
#target-name{font-size:clamp(1.4em,4vw,2em);font-weight:700;color:#ffd700;text-shadow:0 0 16px rgba(255,215,0,.5);line-height:1.1}
#status-row{display:flex;align-items:center;gap:14px;font-size:.85em;flex-shrink:0;flex-wrap:wrap;justify-content:center}
#hearts{letter-spacing:2px}
#hint-text{opacity:.7;font-style:italic;font-size:.8em}
#found-ct{opacity:.5;font-size:.78em}
#map-wrap{flex:1;width:100%;min-height:0;display:flex;align-items:center;justify-content:center}
#map-wrap svg{width:100%;height:100%;max-width:900px;max-height:100%}

/* State styles */
.state-path{fill:#1a2a5a;stroke:#4a6aaa;stroke-width:0.8px;cursor:pointer;transition:fill .15s}
.state-path:hover{fill:#253b70}
.state-path.correct{fill:#4ade80!important;stroke:#22ff88!important;stroke-width:2px!important}
.state-path.wrong{fill:#cc2222!important;stroke:#ff4444!important;stroke-width:2px!important}
.state-path.revealed{fill:#ffd700!important;stroke:#fff!important;stroke-width:2.5px!important}
.state-path.solved{fill:#1a4a2a!important;stroke:#2a7a4a!important;stroke-width:0.8px!important;cursor:default}
/* Hint candidates: a warm glow outline, no fill change so shape stays neutral */
.state-path.candidate{stroke:#f97316!important;stroke-width:2.2px!important;filter:drop-shadow(0 0 5px rgba(249,115,22,.7))}

/* Tooltip */
#tooltip{position:fixed;pointer-events:none;background:rgba(10,10,40,.92);color:#fff;padding:5px 12px;border-radius:10px;font-size:.8em;font-weight:700;z-index:50;display:none;white-space:nowrap;border:1px solid rgba(255,255,255,.2);box-shadow:0 2px 12px rgba(0,0,0,.5)}

#particles{position:fixed;inset:0;pointer-events:none;z-index:60}
.pts{position:fixed;font-size:1.8em;font-weight:700;color:#ffd700;pointer-events:none;animation:rise .9s forwards;z-index:50}
@keyframes rise{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-70px)}}
@keyframes cpop{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
#transition{background:rgba(4,4,28,.97)}
.tc{text-align:center;padding:30px 20px}
#scoreboard{background:linear-gradient(180deg,#07071f,#131352)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:1.2em}
.srow:last-child{border:none}
#mascot{position:fixed;bottom:10px;right:8px;width:64px;z-index:20;display:none}
.mfloat #msvg{animation:mfloat 3s ease-in-out infinite}
@keyframes mfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.mhappy #msvg{animation:mhappy .55s ease forwards}
@keyframes mhappy{0%{transform:translateY(0) rotate(0)}35%{transform:translateY(-28px) rotate(14deg)}65%{transform:translateY(-6px) rotate(-7deg)}100%{transform:translateY(0) rotate(0)}}
.moops #msvg{animation:moops .4s ease forwards}
@keyframes moops{0%,100%{transform:rotate(0)}25%{transform:rotate(-20deg)}75%{transform:rotate(20deg)}}
.mcelebrate #msvg{animation:mcelebrate 1s ease forwards}
@keyframes mcelebrate{0%{transform:rotate(0) scale(1)}50%{transform:rotate(200deg) scale(1.35)}100%{transform:rotate(360deg) scale(1)}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="particles"></div>
<div id="tooltip"></div>

<div id="mascot" class="mfloat">
  <svg id="msvg" viewBox="0 0 80 122" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="30" r="30" fill="rgba(78,193,224,.12)"/>
    <circle cx="40" cy="30" r="26" fill="#d8eef5" stroke="#9bbcc8" stroke-width="2"/>

    <circle cx="34" cy="31" r="3" fill="#fff"/><circle cx="46" cy="31" r="3" fill="#fff"/>
    <circle cx="35" cy="32" r="1.7" fill="#1a2a3a"/><circle cx="47" cy="32" r="1.7" fill="#1a2a3a"/>
    <path d="M 34 39 Q 40 45.5 46 39" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="40" y1="4" x2="40" y2="13" stroke="#9bbcc8" stroke-width="2.5"/>
    <circle cx="40" cy="3" r="3.2" fill="#ffd700"/>
    <rect x="17" y="53" width="46" height="47" rx="14" fill="#d8eef5" stroke="#9bbcc8" stroke-width="2"/>
    <rect x="26" y="62" width="28" height="16" rx="5" fill="#1a9ecb" opacity=".58"/>
    <circle cx="40" cy="70" r="4.5" fill="#ffd700" opacity=".85"/>
    <rect x="19" y="64" width="8" height="5" rx="2" fill="#e8540a" opacity=".7"/>
    <rect x="1" y="56" width="17" height="11" rx="5.5" fill="#d8eef5" stroke="#9bbcc8" stroke-width="1.8"/>
    <rect x="62" y="56" width="17" height="11" rx="5.5" fill="#d8eef5" stroke="#9bbcc8" stroke-width="1.8"/>
    <circle cx="5" cy="62" r="5" fill="#aac8d8"/><circle cx="75" cy="62" r="5" fill="#aac8d8"/>
    <rect x="21" y="96" width="14" height="21" rx="7" fill="#d8eef5" stroke="#9bbcc8" stroke-width="1.8"/>
    <rect x="45" y="96" width="14" height="21" rx="7" fill="#d8eef5" stroke="#9bbcc8" stroke-width="1.8"/>
    <ellipse cx="28" cy="118" rx="9.5" ry="5" fill="#aac8d8"/>
    <ellipse cx="52" cy="118" rx="9.5" ry="5" fill="#aac8d8"/>
  </svg>
</div>

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="card">
    <h1>🗺️ Map Tap</h1>
    <label>🧑‍🚀 Players</label>
    <div id="plist">
      <div class="prow"><span>🧑‍🚀</span><input type="text" placeholder="Your name" class="pname" autocomplete="off" autocorrect="off" autocapitalize="off"></div>
    </div>
    <div class="rbtns">
      <button class="btn btn-ghost" onclick="addP()">+ Add Player</button>
      <button class="btn btn-ghost" onclick="remP()">− Remove</button>
    </div>
    <label>🧠 Difficulty</label>
    <select id="diff">
      <option value="easy">🐣 Easy — 20 famous states + name labels</option>
      <option value="medium" selected>🐥 Medium — all 48 continental</option>
      <option value="hard">🦅 Hard — all 50 states</option>
    </select>
    <label>⏱ Time per Turn</label>
    <select id="ttm">
      <option value="60" selected>60 seconds</option>
      <option value="90">90 seconds</option>
      <option value="120">2 minutes</option>
    </select>
    <br><br>
    <div style="text-align:center"><button class="btn btn-go" onclick="initGame()">🗺️ Start Exploring!</button></div>
    <p style="text-align:center;font-size:.72em;opacity:.4;margin-top:12px">⚠️ Requires internet to load map data</p>
  </div>
</div>

<!-- TRANSITION -->
<div id="transition" class="screen"><div class="tc" id="tc"></div></div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="hud">
    <span id="hud-name">🧑‍🚀</span>
    <span id="hud-score">⭐ 0</span>
    <span id="hud-time">⏱ 60</span>
    <button id="mute-btn" onclick="toggleMute()" style="background:none;border:none;color:#fff;font-size:1.3em;cursor:pointer;padding:4px">🔊</button>
  </div>
  <div id="tbar-wrap"><div id="tbar"></div></div>
  <div id="game-main">
    <div id="target-banner">
      <div id="target-lbl">🗺️ Tap this state:</div>
      <div id="target-name">—</div>
    </div>
    <div id="status-row">
      <span id="hearts">❤️❤️❤️</span>
      <span id="found-ct">✅ 0 found</span>
      <span id="hint-text"></span>
    </div>
    <div id="map-wrap"></div>
  </div>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard" class="screen">
  <div class="card" style="max-width:440px">
    <h1 id="sb-title">🏆 Final Scores!</h1><br>
    <div id="slist"></div><br>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-go" onclick="initGame(true)">🔄 Play Again</button>
      <button class="btn btn-ghost" onclick="showScreen('setup')">⚙️ New Game</button>
    </div>
  </div>
</div>

<script>
// Starfield
(()=>{
  const c=document.getElementById('stars');
  c.width=innerWidth;c.height=innerHeight;
  const x=c.getContext('2d');
  for(let i=0;i<220;i++){x.fillStyle=`rgba(255,255,255,${.15+Math.random()*.85})`;x.beginPath();x.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*1.7,0,Math.PI*2);x.fill();}
})();

// ── State metadata ────────────────────────────────────
const STATE_INFO={
  '01':{id:'AL',n:'Alabama',       reg:'South'},
  '02':{id:'AK',n:'Alaska',        reg:'West'},
  '04':{id:'AZ',n:'Arizona',       reg:'West'},
  '05':{id:'AR',n:'Arkansas',      reg:'South'},
  '06':{id:'CA',n:'California',    reg:'West'},
  '08':{id:'CO',n:'Colorado',      reg:'West'},
  '09':{id:'CT',n:'Connecticut',   reg:'Northeast'},
  '10':{id:'DE',n:'Delaware',      reg:'Northeast'},
  '12':{id:'FL',n:'Florida',       reg:'South'},
  '13':{id:'GA',n:'Georgia',       reg:'South'},
  '15':{id:'HI',n:'Hawaii',        reg:'West'},
  '16':{id:'ID',n:'Idaho',         reg:'West'},
  '17':{id:'IL',n:'Illinois',      reg:'Midwest'},
  '18':{id:'IN',n:'Indiana',       reg:'Midwest'},
  '19':{id:'IA',n:'Iowa',          reg:'Midwest'},
  '20':{id:'KS',n:'Kansas',        reg:'Midwest'},
  '21':{id:'KY',n:'Kentucky',      reg:'South'},
  '22':{id:'LA',n:'Louisiana',     reg:'South'},
  '23':{id:'ME',n:'Maine',         reg:'Northeast'},
  '24':{id:'MD',n:'Maryland',      reg:'Northeast'},
  '25':{id:'MA',n:'Massachusetts', reg:'Northeast'},
  '26':{id:'MI',n:'Michigan',      reg:'Midwest'},
  '27':{id:'MN',n:'Minnesota',     reg:'Midwest'},
  '28':{id:'MS',n:'Mississippi',   reg:'South'},
  '29':{id:'MO',n:'Missouri',      reg:'Midwest'},
  '30':{id:'MT',n:'Montana',       reg:'West'},
  '31':{id:'NE',n:'Nebraska',      reg:'Midwest'},
  '32':{id:'NV',n:'Nevada',        reg:'West'},
  '33':{id:'NH',n:'New Hampshire', reg:'Northeast'},
  '34':{id:'NJ',n:'New Jersey',    reg:'Northeast'},
  '35':{id:'NM',n:'New Mexico',    reg:'West'},
  '36':{id:'NY',n:'New York',      reg:'Northeast'},
  '37':{id:'NC',n:'North Carolina',reg:'South'},
  '38':{id:'ND',n:'North Dakota',  reg:'Midwest'},
  '39':{id:'OH',n:'Ohio',          reg:'Midwest'},
  '40':{id:'OK',n:'Oklahoma',      reg:'South'},
  '41':{id:'OR',n:'Oregon',        reg:'West'},
  '42':{id:'PA',n:'Pennsylvania',  reg:'Northeast'},
  '44':{id:'RI',n:'Rhode Island',  reg:'Northeast'},
  '45':{id:'SC',n:'South Carolina',reg:'South'},
  '46':{id:'SD',n:'South Dakota',  reg:'Midwest'},
  '47':{id:'TN',n:'Tennessee',     reg:'South'},
  '48':{id:'TX',n:'Texas',         reg:'South'},
  '49':{id:'UT',n:'Utah',          reg:'West'},
  '50':{id:'VT',n:'Vermont',       reg:'Northeast'},
  '51':{id:'VA',n:'Virginia',      reg:'South'},
  '53':{id:'WA',n:'Washington',    reg:'West'},
  '54':{id:'WV',n:'West Virginia', reg:'South'},
  '55':{id:'WI',n:'Wisconsin',     reg:'Midwest'},
  '56':{id:'WY',n:'Wyoming',       reg:'West'},
};
const REG_COL={West:'#0e3060',Midwest:'#0a3a20',South:'#3a1a05',Northeast:'#2a0a4a'};
const EASY_IDS=new Set(['TX','CA','FL','NY','OH','MI','IL','WA','OR','CO','AZ','GA','NC','VA','MN','WI','MO','TN','AL','LA','PA']);
const CONT_SKIP=new Set(['AK','HI']);
const MEDALS=['🥇','🥈','🥉','🏅'];
const PTS=[100,60,30];
// Candidate counts per difficulty (includes correct state)
const CANDIDATE_CT={easy:0,medium:5,hard:4}; // easy: labels shown instead
const HINT_DELAY=5000; // ms before candidates light up

// ── Audio ─────────────────────────────────────────────
let AC,muted=false;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function toggleMute(){muted=!muted;document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';}
function tone(f,dur,type='sine',vol=.22,when=0){if(muted||!AC)return;const t=AC.currentTime+when,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.05);}
function sndOk()   {[523,659,784,1047].forEach((f,i)=>tone(f,.14,'sine',.22,i*.07));}
function sndWrong(){[220,160].forEach((f,i)=>tone(f,.2,'triangle',.14,i*.11));}
function sndStart(){[392,523,659,784,1047].forEach((f,i)=>tone(f,.18,'sine',.2,i*.09));}
function sndEnd()  {[784,659,523,392,262].forEach((f,i)=>tone(f,.2,'sine',.19,i*.1));}
function sndTick() {tone(880,.06,'square',.08);}

// ── Game state ─────────────────────────────────────────
let players=[],scores=[],pidx=0,turnSec=60,dk='medium';
let pool=[],queue=[],cur=null,att=0,solved=0;
let timerID=null,hintTimer=null,tLeft=0,gr=false,clickLock=false;
let candidateIds=[]; // currently glowing candidate state abbrs
let usData=null;

// ── Helpers ────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('mascot').style.display=id==='setup'?'none':'block';}
function setMascot(s){const m=document.getElementById('mascot');m.className='';void m.offsetWidth;m.className=s||'mfloat';if(s&&s!=='mfloat')m.addEventListener('animationend',()=>{m.className='mfloat';},{once:true});}
function addP(){const l=document.getElementById('plist');if(l.children.length>=4)return;const n=l.children.length+1;const d=document.createElement('div');d.className='prow';d.innerHTML=`<span>🧑‍🚀</span><input type="text" placeholder="Player ${n}" class="pname" autocomplete="off" autocorrect="off" autocapitalize="off">`;l.appendChild(d);}
function remP(){const l=document.getElementById('plist');if(l.children.length>1)l.removeChild(l.lastChild);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function confetti(x,y){const c=['#ffd700','#4ade80','#60a5fa','#f472b6','#fb923c'];for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,d=45+Math.random()*75;const sp=document.createElement('div');sp.style.cssText=`position:fixed;width:8px;height:8px;border-radius:50%;background:${c[i%5]};left:${x}px;top:${y}px;pointer-events:none;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;animation:cpop .6s forwards;z-index:60`;document.getElementById('particles').appendChild(sp);setTimeout(()=>sp.remove(),700);}}

function getFips(abbr){return Object.entries(STATE_INFO).find(([,v])=>v.id===abbr)?.[0];}
function getEl(abbr){const f=getFips(abbr);return f?document.getElementById('s-'+f):null;}

function setClass(abbr,cls){
  const el=getEl(abbr); if(!el)return;
  el.className.baseVal='state-path '+(cls||'');
  if(!cls){const f=getFips(abbr);el.setAttribute('fill',REG_COL[STATE_INFO[f].reg]);}
}
function flashClass(abbr,cls,dur){
  setClass(abbr,cls);
  setTimeout(()=>setClass(abbr,''),dur);
}

// ── Tooltip ───────────────────────────────────────────
let ttTimer=null;
function showTooltip(text,x,y,dur=2200){
  clearTimeout(ttTimer);
  const tt=document.getElementById('tooltip');
  tt.textContent=text; tt.style.display='block';
  tt.style.left=(x+14)+'px'; tt.style.top=(y-32)+'px';
  if(dur){ttTimer=setTimeout(()=>tt.style.display='none',dur);}
}
function hideTooltip(){clearTimeout(ttTimer);document.getElementById('tooltip').style.display='none';}

// ── Candidates hint ───────────────────────────────────
function clearCandidates(){
  clearTimeout(hintTimer); hintTimer=null;
  candidateIds.forEach(id=>{ const el=getEl(id); if(el&&!el.className.baseVal.includes('solved'))setClass(id,''); });
  candidateIds=[];
}

function showCandidates(){
  if(!cur||!gr)return;
  const n=CANDIDATE_CT[dk]; if(n<2)return;
  const others=pool.filter(s=>s.id!==cur.id&&!getEl(s.id)?.className.baseVal.includes('solved'));
  const picks=shuffle(others).slice(0,n-1);
  candidateIds=[cur.id,...picks.map(s=>s.id)];
  candidateIds.forEach(id=>setClass(id,'candidate'));
  document.getElementById('hint-text').textContent=`💡 It's one of the ${candidateIds.length} glowing states!`;
}

// ── Map ───────────────────────────────────────────────
async function buildMap(){
  if(!usData){
    document.getElementById('map-wrap').innerHTML='<p style="opacity:.5;text-align:center">Loading map… 🌍</p>';
    try{
      usData=await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
    }catch(e){
      document.getElementById('map-wrap').innerHTML='<p style="color:#ff8888;text-align:center">⚠️ Could not load map.<br>Please check your internet connection.</p>';
      return false;
    }
  }
  renderMap(); return true;
}

function renderMap(){
  const wrap=document.getElementById('map-wrap');
  wrap.innerHTML='';
  const svg=d3.select(wrap).append('svg')
    .attr('viewBox','0 0 975 610')
    .attr('preserveAspectRatio','xMidYMid meet');
  const proj=d3.geoAlbersUsa().scale(1300).translate([487.5,305]);
  const path=d3.geoPath().projection(proj);
  const features=topojson.feature(usData,usData.objects.states).features;
  const mesh=topojson.mesh(usData,usData.objects.states,(a,b)=>a!==b);

  // centroid lookup for label placement
  const centroid=d3.geoPath().projection(proj).centroid.bind(d3.geoPath().projection(proj));

  const g=svg.append('g');

  // State fills
  g.selectAll('path.state-path')
    .data(features)
    .join('path')
    .attr('class','state-path')
    .attr('id',d=>'s-'+String(d.id).padStart(2,'0'))
    .attr('d',path)
    .attr('fill',d=>{const info=STATE_INFO[String(d.id).padStart(2,'0')];return info?REG_COL[info.reg]:'#1a2a5a';})
    .on('mousemove',(e,d)=>{
      // Easy mode: always show tooltip on hover
      if(dk!=='easy')return;
      const info=STATE_INFO[String(d.id).padStart(2,'0')];
      if(!info)return;
      showTooltip(info.n,e.clientX,e.clientY,0); // dur=0 = persistent while hovering
    })
    .on('mouseleave',()=>{ if(dk==='easy')hideTooltip(); })
    .on('click',(e,d)=>{
      const info=STATE_INFO[String(d.id).padStart(2,'0')];
      if(info)handleClick(info,e.clientX,e.clientY);
    });

  // State borders
  g.append('path')
    .datum(mesh)
    .attr('fill','none')
    .attr('stroke','rgba(100,140,200,.35)')
    .attr('stroke-width','0.6')
    .attr('d',path);

  // Easy-mode labels (always visible abbreviations)
  if(dk==='easy'){
    g.selectAll('text.state-lbl')
      .data(features.filter(d=>EASY_IDS.has(STATE_INFO[String(d.id).padStart(2,'0')]?.id)))
      .join('text')
      .attr('class','state-lbl')
      .attr('pointer-events','none')
      .attr('x',d=>proj(d3.geoCentroid(d))?.[0]??0)
      .attr('y',d=>proj(d3.geoCentroid(d))?.[1]??0)
      .attr('dy','0.35em')
      .attr('text-anchor','middle')
      .attr('font-size','11')
      .attr('font-weight','700')
      .attr('font-family',"'Comic Sans MS',cursive")
      .attr('fill','rgba(255,255,255,.75)')
      .attr('pointer-events','none')
      .text(d=>STATE_INFO[String(d.id).padStart(2,'0')]?.id||'');
  }
}

// ── Game flow ──────────────────────────────────────────
async function initGame(same=false){
  initAC();
  if(!same)players=[...document.querySelectorAll('.pname')].map((el,i)=>el.value.trim()||`Player ${i+1}`);
  scores=players.map(()=>0); pidx=0;
  turnSec=parseInt(document.getElementById('ttm').value);
  dk=document.getElementById('diff').value;
  showScreen('transition');
  document.getElementById('tc').innerHTML=`<div style="font-size:3em">🌍</div><p style="margin-top:12px;opacity:.7">Loading map…</p>`;
  const ok=await buildMap();
  if(!ok){showScreen('setup');return;}
  doTrans();
}

function buildPool(){
  const all=Object.values(STATE_INFO);
  if(dk==='easy')      return all.filter(s=>EASY_IDS.has(s.id));
  else if(dk==='medium') return all.filter(s=>!CONT_SKIP.has(s.id));
  return all;
}

function doTrans(){
  clearInterval(timerID); clearCandidates(); gr=false;
  showScreen('transition'); setMascot('mfloat');
  const solo=players.length===1;
  const prev=!solo&&pidx>0?`<p style="opacity:.6;margin-top:8px">Previous: ${scores[pidx-1]} ⭐</p>`:'';
  document.getElementById('tc').innerHTML=`
    <div style="font-size:3.5em;margin-bottom:10px">${['🗺️','⭐','🧭','🌙'][pidx%4]}</div>
    <h1 style="font-size:2.2em">${solo?'Get Ready, Explorer!':players[pidx]+"'s Turn!"}</h1>
    <p style="opacity:.75;margin:12px 0 6px">Tap each state before time runs out! 🗺️</p>
    ${prev}<br>
    <button class="btn btn-go" style="font-size:1.2em" onclick="startTurn()">🗺️ Start Exploring!</button>`;
}

function startTurn(){
  showScreen('game'); sndStart();
  pool=buildPool(); queue=shuffle([...pool]);
  solved=0; gr=true; clickLock=false;
  document.getElementById('hud-name').textContent=`🧑‍🚀 ${players[pidx]}`;
  document.getElementById('hud-score').textContent=`⭐ 0`;
  tLeft=turnSec; document.getElementById('tbar').style.width='100%';
  setMascot('mfloat');
  Object.values(STATE_INFO).forEach(s=>setClass(s.id,''));
  nextState();

  const t0=Date.now(); let lastTick=turnSec+1;
  timerID=setInterval(()=>{
    if(!gr)return;
    tLeft=Math.max(0,turnSec-(Date.now()-t0)/1000);
    const c=Math.ceil(tLeft);
    document.getElementById('hud-time').textContent=`⏱ ${c}`;
    const pct=tLeft/turnSec;
    document.getElementById('tbar').style.width=(pct*100)+'%';
    document.getElementById('tbar').style.background=pct>.3?'#4ade80':'#e8540a';
    if(tLeft<=5&&c<lastTick){lastTick=c;sndTick();}
    if(tLeft<=0)endTurn();
  },150);
}

function endTurn(){
  if(!gr)return; gr=false;
  clearInterval(timerID); clearCandidates(); hideTooltip();
  sndEnd(); setMascot('mcelebrate');
  setTimeout(()=>{pidx++;pidx<players.length?doTrans():showBoard();},950);
}

function nextState(){
  if(!gr)return;
  clearCandidates(); hideTooltip();
  if(!queue.length) queue=shuffle([...pool]);
  cur=queue.pop(); att=0; clickLock=false;
  document.getElementById('target-name').textContent=cur.n;
  document.getElementById('hint-text').textContent='';
  document.getElementById('hearts').textContent='❤️❤️❤️';
  document.getElementById('found-ct').textContent=`✅ ${solved} found`;

  // Schedule candidate hint (not on easy — labels already shown)
  if(dk!=='easy'&&CANDIDATE_CT[dk]>0){
    hintTimer=setTimeout(()=>{ if(gr&&cur)showCandidates(); },HINT_DELAY);
  }
}

function handleClick(info,cx,cy){
  if(!gr||!cur||clickLock)return;

  if(info.id===cur.id){
    // ✅ Correct!
    const pts=PTS[Math.min(att,PTS.length-1)];
    scores[pidx]+=pts; solved++;
    sndOk(); setMascot('mhappy'); clickLock=true;
    clearCandidates(); hideTooltip();
    document.getElementById('hud-score').textContent=`⭐ ${scores[pidx]}`;
    setClass(info.id,'correct');
    const ptEl=document.createElement('div');
    ptEl.className='pts'; ptEl.textContent=`+${pts}`;
    ptEl.style.cssText=`left:${cx-22}px;top:${cy-20}px`;
    document.body.appendChild(ptEl); setTimeout(()=>ptEl.remove(),950);
    confetti(cx,cy);
    setTimeout(()=>{setClass(info.id,'solved');nextState();},650);

  } else {
    // ❌ Wrong — show tooltip with the name of what they clicked
    att++; sndWrong(); setMascot('moops');
    flashClass(info.id,'wrong',450);
    showTooltip(info.n,cx,cy,2200); // show what they tapped for 2.2s
    const h=['❤️','❤️','❤️'];
    for(let i=3-att;i<3;i++)h[i]='🖤';
    document.getElementById('hearts').textContent=h.join('');
    if(att===1){
      document.getElementById('hint-text').textContent=`Hint: It's in the ${cur.reg}`;
      clearTimeout(hintTimer); hintTimer=null;
      showCandidates();
    }
    if(att>=3){
      clickLock=true; clearCandidates();
      setClass(cur.id,'revealed');
      document.getElementById('hint-text').textContent=`It was ${cur.n}! 🔍`;
      setTimeout(()=>{setClass(cur.id,'solved');nextState();},1600);
    }
  }
}

function showBoard(){
  showScreen('scoreboard'); setMascot('mcelebrate'); sndStart();
  const solo=players.length===1;
  if(solo){
    document.getElementById('sb-title').textContent=`🎉 Great job, ${players[0]}!`;
    document.getElementById('slist').innerHTML=`<div class="srow" style="justify-content:center;font-size:1.4em">⭐ ${scores[0]} pts &nbsp;•&nbsp; ${solved} states found!</div>`;
  } else {
    document.getElementById('sb-title').textContent='🏆 Final Scores!';
    const ranked=[...players.map((n,i)=>({n,s:scores[i]}))].sort((a,b)=>b.s-a.s);
    document.getElementById('slist').innerHTML=ranked.map((p,i)=>`
      <div class="srow"><span>${MEDALS[i]||'🏅'} ${p.n}</span><span>${p.s} ⭐</span></div>`).join('');
  }
}
</script>
